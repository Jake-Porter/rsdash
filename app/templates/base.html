<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Runescape Dashboard{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="topnav">
        <a href="/" class="brand">
            <span class="brand-title">⚔ Runescape Dashboard</span>
            <span class="brand-subtitle">created by Adobe</span>
        </a>
        <span class="nav-links">
            <a href="/xp">🏆 XP</a>
            <span class="sep">·</span>
            <a href="/kc">💀 Bosses</a>
            <span class="sep">·</span>
            <a href="/weekly">✅ Tasks</a>
            <span class="sep">·</span>
            <a href="/goals">🎯 Goals</a>
            <span class="sep">·</span>
            <a href="/feed">📜 Feed</a>
        </span>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        Some icons courtesy of the <a href="https://runescape.wiki" target="_blank" rel="noopener">RuneScape Wiki</a> (CC BY-NC-SA).
        RuneScape is a trademark of Jagex Ltd. rsdash is an unofficial fan project, not affiliated with or endorsed by Jagex.
    </footer>
</body>
</html>
